spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# Stabilize backend during development (disable DevTools restart)
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Run on a non-default port to avoid common 8080 conflicts during local development.
server.port=${PORT:8080}
# JWT configuration can be overridden via environment variables in deployment.
jwt.secret=${JWT_SECRET:omotec-super-secure-secret-key-2026-omotec-management}
jwt.expiration=${JWT_EXPIRATION:18000000}
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE